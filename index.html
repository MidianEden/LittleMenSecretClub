<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LittleMen Clubhouse</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ENTRY SCREEN -->
  <div id="entryScreen" class="entry-screen">
    <div class="door">
      <h1>🔑 Welcome to the LittleMen Clubhouse</h1>
      <input type="password" id="secretCodeInput" placeholder="Enter Secret Code">
      <button id="secretCodeSubmit">Enter 🚪</button>
    </div>
  </div>

  <!-- MAIN CLUBHOUSE -->
  <div id="clubhouse" class="hidden">
    <!-- SIDEBAR -->
    <nav class="sidebar">
      <h2 class="club-sign">🏠 LittleMen Clubhouse</h2>
      <button data-tab="welcome" class="active">Welcome</button>
      <button data-tab="rules">📜 Rules</button>
      <button data-tab="announcements">📢 Announcements</button>
      <button data-tab="events">📅 Events</button>
      <button data-tab="chat">💬 Chat</button>
      <button id="clubTriviaBtn">❓ Trivia</button>
      <a href="#" class="logout">🚪 Logout</a>
      <button id="changeUsernameBtn">✏️ Change Username</button>

      <!-- OWNER EDITOR -->
      <div id="ownerEditor" style="display:none;">
        <h3>📌 Owner Bulletin Board</h3>
        <form id="ownerEditForm">
          <label>Welcome Title</label>
          <input type="text" id="welcomeTitle" maxlength="100" />
          <label>Welcome Text</label>
          <textarea id="welcomeText" maxlength="1000"></textarea>
          <label>Rules Text</label>
          <textarea id="rulesText" maxlength="2000"></textarea>
          <label>Announcements Text</label>
          <textarea id="announcementsText" maxlength="1000"></textarea>
          <label>Events Text</label>
          <textarea id="eventsText" maxlength="1000"></textarea>
          <button type="submit">💾 Save Changes</button>
        </form>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="content">
      <section id="welcome" class="active">
        <h1>Loading...</h1>
        <p></p>
      </section>

      <section id="rules">
        <h3>Loading...</h3>
        <div id="rulesContent"></div>
      </section>

      <section id="announcements">
        <h3>Loading...</h3>
        <div id="announcementsContent"></div>
      </section>

      <section id="events">
        <h3>Loading...</h3>
        <div id="eventsContent"></div>
      </section>

      <section id="chat">
        <h3>💬 Club Chat</h3>
        <div id="chat-container">
          <ul id="messages"></ul>
          <div id="chat-input-area">
            <input id="msgInput" type="text" placeholder="Say something..." autocomplete="off" />
            <button id="sendBtn">Send</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- USERNAME PROMPT -->
  <div id="usernamePrompt" class="overlay hidden">
    <div class="prompt-box">
      <h2>Enter your username</h2>
      <input type="text" id="usernameInput" maxlength="40" placeholder="Your nickname" />
      <button id="usernameSubmit">Join Chat</button>
    </div>
  </div>

  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="script.js"></script>

</body>
</html>
