<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LittleMen Secret Club</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2&display=swap" rel="stylesheet">
  <script>
    function checkPassword() {
      const input = document.getElementById("password-input").value.trim().toLowerCase();
      const enterBtn = document.getElementById("enter-btn");
      const correct = ["lmn-code-001"]; // 🔑 accepted codes

      if (correct.includes(input)) {
        enterBtn.style.display = "inline-block";
        document.getElementById("wrong-pass").style.display = "none";
      } else {
        enterBtn.style.display = "none";
        if (input !== "") {
          document.getElementById("wrong-pass").style.display = "block";
        }
      }
    }
  </script>
</head>
<body>
  <div class="bg">
    <div class="container">
      <h1>🎉 Welcome to the LittleMen Secret Club! 🎉</h1>
      <p>Only the coolest, quirkiest collectors get in...</p>

      <input type="text" id="password-input" placeholder="Enter secret code" oninput="checkPassword()" class="pass-input">
      <p id="wrong-pass" style="display:none; color: red; font-size: 0.9rem;">❌ Wrong code, try again.</p>

      <a href="EgZjaHJvbGODwyISgYOTIMCAEQIxgnGIAEGIoFMhKINGadwmiaoAuGIMB.html" class="enter-btn" id="enter-btn" style="display: none;">Enter the Clubhouse 🚪</a>
    </div>
  </div>
</body>
</html>
